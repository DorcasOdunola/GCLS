<div class="main-content-wrapper">
  <div class="container-fluid p-5">
    <div class="row">
      <div
        class="col-11 col-md-10 mx-auto bg-light rounded-4 d-flex justify-content-between align-items-center p-4 mb-5 shadow-sm"
      >
        <div>
          <h2 class="page-title mb-3">COMPUTER SCIENCE, SSS 2</h2>
          <button
            mat-flat-button
            color="primary"
            class="create-btn"
            routerLink="/admin/quiz-setup"
            (click)="openQuiz(0)"
          >
            <mat-icon>add</mat-icon> CREATE NEW QUIZ
          </button>
        </div>
        <div class="hand-icon">
          <mat-icon style="transform: scale(2.5)">front_hand</mat-icon>
        </div>
      </div>
    </div>

    <div>
      <div class="row mb-4">
        <div class="col-11 col-md-10 mx-auto">
          <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" *ngFor="let quiz of quizArray">
              <div class="card quiz-card h-100 border-0 shadow-sm">
                <div
                  class="card-img-top pink-header d-flex align-items-center justify-content-center"
                >
                  <img src="assets/white-book.png" alt="Quiz Icon" class="quiz-thumb" />
                </div>

                <div class="card-body p-4">
                  <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                      <small class="text-muted fw-bold text-uppercase" style="font-size: 0.7rem"
                        >Quiz: {{ quiz.quiz_title }}</small
                      >
                      <h5 class="card-title fw-bold mt-1 text-uppercase">
                        LESSON: {{ quiz.lesson_topic }}
                      </h5>
                    </div>
                    <button
                      mat-flat-button
                      color="primary"
                      routerLink="/admin/quiz-setup"
                      class="open-btn"
                      (click)="openQuiz(quiz.quiz_id)"
                    >
                      OPEN
                    </button>
                  </div>

                  <div class="d-flex gap-2 my-3">
                    <span class="stat-badge purple-badge">
                      <span class="count">{{ quiz.questions_count }}</span> Questions
                    </span>
                    <span class="stat-badge red-badge">
                      <span class="count">3</span> Quiz written
                    </span>
                  </div>

                  <p class="text-muted mb-0" style="font-size: 0.65rem">
                    Created on: {{ quiz.created_at | date: 'shortDate' }}
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
